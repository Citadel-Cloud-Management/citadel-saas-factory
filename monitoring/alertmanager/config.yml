global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default
    # Configure your SMTP or webhook receiver
    webhook_configs:
      - url: "http://localhost:9093/webhook"
        send_resolved: true
