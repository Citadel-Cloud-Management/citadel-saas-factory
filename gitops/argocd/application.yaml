apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: citadel-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Citadel-Cloud-Management/citadel-saas-factory.git
    targetRevision: main
    path: gitops/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: citadel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: citadel-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Citadel-Cloud-Management/citadel-saas-factory.git
    targetRevision: main
    path: gitops/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: citadel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
