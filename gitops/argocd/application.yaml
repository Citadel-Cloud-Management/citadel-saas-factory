apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: citadel-saas-factory
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Citadel-Cloud-Management/citadel-saas-factory.git
    targetRevision: main
    path: gitops/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: citadel
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
