apiVersion: apps/v1
kind: Deployment
metadata:
  name: citadel-backend
  labels:
    app: citadel-backend
    version: "3.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: citadel-backend
  template:
    metadata:
      labels:
        app: citadel-backend
        version: "3.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/Citadel-Cloud-Management/citadel-saas-factory/backend:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: citadel-secrets
