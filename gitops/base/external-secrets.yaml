apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: citadel
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: citadel-backend
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: citadel-secrets
  namespace: citadel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: citadel-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: citadel/production/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: citadel/production/redis-url
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: citadel/production/stripe-secret-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: citadel/production/stripe-webhook-secret
    - secretKey: JWT_SECRET
      remoteRef:
        key: citadel/production/jwt-secret
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: citadel/production/anthropic-api-key
