apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: citadel
resources:
  - ../../base
images:
  - name: backend
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/citadel/backend
    newTag: latest
  - name: frontend
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/citadel/frontend
    newTag: latest
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: citadel-backend
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: citadel-frontend
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: frontend
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
