title: API Key Leak in Logs
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: Detects potential API key exposure in application logs
author: Citadel Security
date: 2026/04/11
tags:
  - attack.credential_access
  - attack.t1552
  - attack.t1552.001
logsource:
  category: application
  product: citadel-api
detection:
  selection:
    log_message|contains:
      - "sk-ant-"
      - "ghp_"
      - "Bearer "
      - "api_key="
      - "ANTHROPIC_API_KEY"
  condition: selection
falsepositives:
  - Log entries that reference key names without values
level: critical
