name: Starter Kit CI

on:
  push:
    branches: [main]
    paths:
      - 'starter-kit/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'starter-kit/**'

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-kit/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m compileall app

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-kit/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint || true
      - run: npm run build
