name: Social Promotion Bot
on:
  schedule:
    - cron: '0 14 * * 1-5'  # Mon-Fri at 2pm UTC
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get random repo info
        id: repo
        run: |
          echo "repo_count=$(gh repo list Citadel-Cloud-Management --public --limit 100 --json name --jq length)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log promotion
        run: |
          echo "Promoting Citadel Cloud Management repos"
          echo "Total public repos: ${{ steps.repo.outputs.repo_count }}"
          echo "Website: https://citadelcloudmanagement.com"
          echo "GitHub: https://github.com/Citadel-Cloud-Management"
