name: CI/CD Pipeline — AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_STAGING: citadel-staging-eks
  EKS_CLUSTER_PRODUCTION: citadel-production-eks

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && pip install -e ".[dev]" && pytest --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          REDIS_URL: redis://localhost:6379/0
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npx vitest --run --coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  sca:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1

  secret-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, sast, sca, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.ECR_REGISTRY }}/citadel/backend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/citadel/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.ECR_REGISTRY }}/citadel/frontend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/citadel/frontend:latest

  container-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/citadel/backend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/citadel/frontend:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: container-scan
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_STAGING }} --region ${{ env.AWS_REGION }}

      - name: Set image tag in kustomization
        run: |
          cd gitops/overlays/staging
          kustomize edit set image backend=${{ env.ECR_REGISTRY }}/citadel/backend:${{ github.sha }}
          kustomize edit set image frontend=${{ env.ECR_REGISTRY }}/citadel/frontend:${{ github.sha }}

      - name: Deploy to staging
        run: kubectl apply -k gitops/overlays/staging/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/citadel-backend -n citadel --timeout=300s
          kubectl rollout status deployment/citadel-frontend -n citadel --timeout=300s

      - name: Smoke test staging
        run: |
          BACKEND_URL=$(kubectl get ingress citadel-ingress -n citadel -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "http://${BACKEND_URL}/health" || (echo "Smoke test failed — rolling back" && kubectl rollout undo deployment/citadel-backend -n citadel && kubectl rollout undo deployment/citadel-frontend -n citadel && exit 1)

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_PRODUCTION }} --region ${{ env.AWS_REGION }}

      - name: Set image tag in kustomization
        run: |
          cd gitops/overlays/production
          kustomize edit set image backend=${{ env.ECR_REGISTRY }}/citadel/backend:${{ github.sha }}
          kustomize edit set image frontend=${{ env.ECR_REGISTRY }}/citadel/frontend:${{ github.sha }}

      - name: Deploy to production
        run: kubectl apply -k gitops/overlays/production/

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/citadel-backend -n citadel --timeout=300s
          kubectl rollout status deployment/citadel-frontend -n citadel --timeout=300s

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "Rolling back production deployments..."
          kubectl rollout undo deployment/citadel-backend -n citadel
          kubectl rollout undo deployment/citadel-frontend -n citadel
          kubectl rollout status deployment/citadel-backend -n citadel --timeout=120s
          kubectl rollout status deployment/citadel-frontend -n citadel --timeout=120s

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Production deploy FAILED for ${{ github.sha }} — automatic rollback initiated"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Production deploy SUCCESS for ${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
