# Parallel Agents — Multi-Model CI/CD Pipeline
# Fans out agent tasks across model providers on push, PR, and cron

name: Parallel Agents

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6 AM UTC

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Business Profile
    runs-on: ubuntu-latest
    outputs:
      vertical: ${{ steps.detect.outputs.vertical }}
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          chmod +x scripts/detect-business.sh
          ./scripts/detect-business.sh
          if [[ -f BUSINESS_PROFILE.yaml ]]; then
            echo "vertical=$(grep 'vertical:' BUSINESS_PROFILE.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"
            echo "stack=$(grep 'primary_stack:' BUSINESS_PROFILE.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          else
            echo "vertical=unknown" >> "$GITHUB_OUTPUT"
            echo "stack=unknown" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify Installation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run verification
        run: |
          chmod +x scripts/verify-install.sh
          ./scripts/verify-install.sh

  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [ruff, eslint, semgrep, gitleaks]
    steps:
      - uses: actions/checkout@v4
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            ruff) pip install ruff && ruff check backend/ 2>/dev/null || echo "No backend to lint" ;;
            eslint) npm install eslint 2>/dev/null && npx eslint frontend/ 2>/dev/null || echo "No frontend to lint" ;;
            semgrep) pip install semgrep && semgrep scan --config auto . 2>/dev/null || echo "Semgrep scan skipped" ;;
            gitleaks) docker run --rm -v "$PWD":/repo zricethezav/gitleaks:latest detect --source /repo 2>/dev/null || echo "Gitleaks skipped" ;;
          esac

  eval:
    name: Model Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run promptfoo eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx promptfoo eval -c evals/promptfoo.yaml 2>/dev/null || echo "Eval skipped — set API keys in secrets"
