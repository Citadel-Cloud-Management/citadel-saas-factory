replicaCount: 2

image:
  repository: ghcr.io/Citadel-Cloud-Management/citadel-saas-factory/backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  hosts:
    # Update with your domain
    - host: app.citadelcloudmanagement.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: citadel-tls
      hosts:
        - app.citadelcloudmanagement.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  APP_ENV: production
