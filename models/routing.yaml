# Model Routing — Tier-Based Selection
# Each tier defines a primary model with ordered fallbacks
# Agents reference tiers, not specific models

tiers:
  reasoning_deep:
    description: Complex architecture, long refactors, critical decisions
    primary: claude-opus-4-6
    fallbacks:
      - gemini-2.5-pro
      - deepseek-r1
      - gpt-4.1
    max_tokens: 16384
    temperature: 0.3

  reasoning_fast:
    description: Default agent mode, balanced coding tasks
    primary: claude-sonnet-4-6
    fallbacks:
      - gemini-2.5-pro
      - gpt-4.1
      - deepseek-v3
    max_tokens: 8192
    temperature: 0.5

  cheap_fast:
    description: Tab completion, lightweight edits, boilerplate
    primary: claude-haiku-4-5
    fallbacks:
      - gemini-2.5-flash
      - gpt-4.1-mini
      - qwen-2.5-coder-32b
    max_tokens: 4096
    temperature: 0.7

  long_context:
    description: Full-codebase reasoning, large file analysis
    primary: gemini-2.5-pro
    fallbacks:
      - gemini-2.5-flash
      - claude-opus-4-6
      - gpt-4.1
    max_tokens: 16384
    temperature: 0.3

  code_specialist:
    description: Code-tuned models for generation and review
    primary: codestral-latest
    fallbacks:
      - qwen-2.5-coder-32b
      - deepseek-v3
      - claude-sonnet-4-6
    max_tokens: 8192
    temperature: 0.4

  vision:
    description: Screenshot-to-code, UI reasoning, design-to-code
    primary: claude-opus-4-6
    fallbacks:
      - gemini-2.5-pro
      - gpt-4.1
      - llama-3.2-vision
    max_tokens: 8192
    temperature: 0.4

  local_only:
    description: Air-gapped or cost-zero tier using self-hosted models
    primary: llama-3.3-70b
    fallbacks:
      - llama-3.1-405b
      - deepseek-v3
      - qwen-2.5-72b
    max_tokens: 4096
    temperature: 0.5
    runtime: ollama

  ultra_context:
    description: Massive context for full-repo analysis (1M-10M tokens)
    primary: gemini-2.5-pro
    fallbacks:
      - claude-opus-4-6
      - gpt-4.1
      - llama-3.1-405b
    max_tokens: 16384
    temperature: 0.3

  reasoning_chain:
    description: Multi-step chain-of-thought reasoning tasks
    primary: o4
    fallbacks:
      - deepseek-r1-0528
      - deepseek-r1
      - claude-opus-4-6
    max_tokens: 32768
    temperature: 0.2

  multilingual:
    description: Non-English languages, translation, multilingual code
    primary: mistral-large-2
    fallbacks:
      - qwen-2.5-72b
      - gemini-2.5-pro
      - claude-sonnet-4-6
    max_tokens: 8192
    temperature: 0.4

  rag_specialist:
    description: Retrieval-augmented generation with source grounding
    primary: command-a
    fallbacks:
      - command-r-plus
      - claude-sonnet-4-6
      - gemini-2.5-pro
    max_tokens: 8192
    temperature: 0.3

  open_source_frontier:
    description: Best open-weights models matching closed frontier
    primary: deepseek-v3
    fallbacks:
      - qwen-2.5-72b
      - llama-3.3-70b
      - llama-3.1-405b
    max_tokens: 8192
    temperature: 0.4

selection_rules:
  - condition: "task.complexity == 'high' and task.type == 'architecture'"
    tier: reasoning_deep
  - condition: "task.type == 'code_generation'"
    tier: reasoning_fast
  - condition: "task.type == 'completion' or task.type == 'boilerplate'"
    tier: cheap_fast
  - condition: "task.context_tokens > 200000"
    tier: long_context
  - condition: "task.type == 'code_review' or task.type == 'refactor'"
    tier: code_specialist
  - condition: "task.has_image or task.type == 'design_to_code'"
    tier: vision
  - condition: "env.OFFLINE_MODE == 'true'"
    tier: local_only
  - condition: "task.context_tokens > 1000000"
    tier: ultra_context
  - condition: "task.type == 'chain_of_thought' or task.type == 'math'"
    tier: reasoning_chain
  - condition: "task.language != 'en'"
    tier: multilingual
  - condition: "task.type == 'rag' or task.type == 'search'"
    tier: rag_specialist
  - condition: "env.OPEN_SOURCE_ONLY == 'true'"
    tier: open_source_frontier

cost_controls:
  daily_budget_usd: 50
  alert_threshold_pct: 80
  fallback_on_budget_exceeded: local_only
